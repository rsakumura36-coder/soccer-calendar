<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Soccer Calendar</title>
</head>
<body>

    <h1>⚽ Soccer Calendar</h1>

    <h2>チーム選択</h2>

    <form method="POST">

        <select name="team_id">
            {% for name, id in teams.items() %}
            <option value="{{ id }}">{{ name }}</option>
            {% endfor %}
        </select>

        <button type="submit">
            試合取得
        </button>

    </form>

    {% if message %}
    <p style="color:green;">
        {{ message }}
    </p>
    {% endif %}

    {% if matches %}

    <h2>試合一覧</h2>

    <ul>
        {% for match in matches %}

        <li>
            <strong>
                {{ match.home }} vs {{ match.away }}
            </strong>
            <br>

            {{ match.start.strftime("%Y-%m-%d %H:%M") }}
            <br>

            {{ match.competition }}
        </li>

        <br>

        {% endfor %}
    </ul>

    {% endif %}

</body>
</html>
