<h2>チーム選択</h2>

<form method="POST">

    <select name="team_id">
        {% for name, id in teams.items() %}
        <option value="{{ id }}">{{ name }}</option>
        {% endfor %}
    </select>

    <button type="submit">
        カレンダー登録
    </button>

</form>


{% if message %}
<p style="color:green;">{{ message }}</p>
{% endif %}
