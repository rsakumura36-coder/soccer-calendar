<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Soccer Calendar</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 自分のCSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container py-4">

    <h1 class="text-center mb-4">⚽ Soccer Calendar</h1>

    <!-- =========================
         チーム選択フォーム
    ========================= -->
    <form method="POST" class="mb-4">

        <div class="mb-3">
            <label class="form-label">リーグ</label>
            <select name="league" class="form-select">

                {% for league in leagues %}
                <option value="{{ league }}"
                    {% if league == selected_league %}selected{% endif %}>
                    {{ league }}
                </option>
                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">チーム</label>
            <select name="team_id" class="form-select">

                {% for name, id in teams.items() %}
                <option value="{{ id }}">
                    {{ name }}
                </option>
                {% endfor %}

            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            試合取得
        </button>

    </form>

    <!-- =========================
         メッセージ
    ========================= -->
    {% if message %}
    <div class="alert alert-success text-center">
        {{ message }}
    </div>
    {% endif %}

    <!-- =========================
         試合一覧
    ========================= -->
    {% if matches %}

    <h2 class="mb-3">試合一覧</h2>

    {% for match in matches %}

    <div class="card shadow-sm mb-3 p-3">

        <!-- チーム表示 -->
        <div class="d-flex align-items-center justify-content-between">

            <!-- ホーム -->
            <div class="text-center">
                <img src="{{ match.home_logo }}" width="50" height="50">
                <div class="fw-bold">{{ match.home }}</div>
            </div>

            <!-- VS -->
            <div class="fw-bold fs-4">VS</div>

            <!-- アウェイ -->
            <div class="text-center">
                <img src="{{ match.away_logo }}" width="50" height="50">
                <div class="fw-bold">{{ match.away }}</div>
            </div>

        </div>

        <hr>

        <!-- 試合情報 -->
        <div class="text-center text-muted">
            {{ match.start.strftime("%Y-%m-%d %H:%M") }}
        </div>

        <div class="text-center text-muted">
            {{ match.competition }}
        </div>

    </div>

    {% endfor %}

    {% endif %}

</div>

<!-- =========================
     JSデータ受け渡し
========================= -->
<script>
    window.allTeams = {{ all_teams | safe }};
</script>

<!-- 外部JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
